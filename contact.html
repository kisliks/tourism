<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Wanderlust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">WANDERLUST</div>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="hero-contact">
        <div class="overlay">
            <h1>Contact Our Team</h1>
        </div>
    </header>

    <main>
        <div class="contact-container">
            <div class="contact-info">
                <h3>Our Office</h3>
                <img src="https://www.bromic.ca/wp-content/uploads/sites/3/2023/08/Crown-Towers-Perth-Bromic-Tungsten-Electric-1600x1067.jpg" alt="Office" style="width:100%; border-radius:10px; margin-bottom:15px;">
                <p>📍 45 Ocean Drive, Miami, USA</p>
                <p>📞 +1 (555) 000-1234</p>
                <p>✉️ support@wanderlust.com</p>
            </div>
            <form class="contact-form">
                <h3>Get a Quote</h3>
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Tell us about your dream trip..." rows="5" required></textarea>
                <button type="submit" class="btn-main">Send Message</button>
            </form>
        </div>
    </main>
    <footer><p>&copy; 2026 Wanderlust Travel</p></footer>
</body>
</html>
